services:
  postgres:
    image: postgres:16
    container_name: allosta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: allosta
      POSTGRES_USER: allosta
      POSTGRES_PASSWORD: allosta
    ports:
      - "5432:5432"
    volumes:
      - allosta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allosta -d allosta"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  allosta_pgdata:
